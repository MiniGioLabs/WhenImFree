name: Deploy CalenDate

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          pip install uv
          uv sync
          PYTHONPATH=src uv run pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t calendate:latest .

      - name: Ship image to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd ~/calendate
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            sleep 5
            curl -sf http://localhost:8000/health && echo "✓ Deploy OK" || echo "✗ Health check failed"
