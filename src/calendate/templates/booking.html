{% extends "base.html" %}
{% block title %}{{ host.name }} — CalenDate{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <!-- Host profile -->
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-brand text-white rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-3 overflow-hidden">
            {% if host.avatar_url %}
            <img src="{{ host.avatar_url }}" class="w-full h-full object-cover">
            {% else %}
            {{ host.name[0]|upper }}
            {% endif %}
        </div>
        <h1 class="text-xl font-bold">{{ host.name }}</h1>
        <p class="text-gray-500 text-sm">Pick a date to book</p>
    </div>

    <!-- Calendar -->
    <div class="bg-white border border-gray-200 rounded-2xl p-4 mb-4">
        {% include "partials/_booking_calendar.html" %}
    </div>

    <!-- Day detail -->
    <div id="day-slots"></div>
</div>
{% endblock %}
