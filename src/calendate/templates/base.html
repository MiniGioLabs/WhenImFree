<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CalenDate{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Share your availability and let people book time with you.{% endblock %}">
    <!-- Open Graph / link preview -->
    <meta property="og:site_name" content="CalenDate">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:title" content="{% block og_title %}CalenDate — Book a Date{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Share your availability and let people book time with you.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ request.base_url }}static/og-image.png{% endblock %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ self.og_title() }}">
    <meta name="twitter:description" content="{{ self.og_description() }}">
    <meta name="twitter:image" content="{{ self.og_image() }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:'#4F46E5','brand-dark':'#3730A3'}}}}</script>
    <style>.htmx-indicator{opacity:0;transition:opacity 0.2s}.htmx-request .htmx-indicator{opacity:1}</style>
</head>
<body class="bg-gray-50 min-h-screen antialiased">
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-brand">📅 CalenDate</a>
            <div class="flex gap-3 text-sm items-center">
                {% if request.session.get('user_phone') %}
                    <a href="/dashboard" class="text-gray-500 hover:text-brand font-medium">Dashboard</a>
                    <a href="/settings" class="text-gray-500 hover:text-brand font-medium">Settings</a>
                    <a href="/logout" class="text-gray-400 hover:text-red-500">Log out</a>
                {% else %}
                    <a href="/login" class="text-gray-500 hover:text-brand font-medium">Log in</a>
                    <a href="/signup" class="bg-brand text-white px-3 py-1.5 rounded-lg hover:bg-brand-dark font-medium">Sign up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-2xl mx-auto px-4 py-6">{% block content %}{% endblock %}</main>
    <footer class="text-center text-gray-400 text-xs py-8">CalenDate 📅 — MiniGioLabs</footer>
</body>
</html>
