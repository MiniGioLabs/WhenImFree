services:
  calendate:
    build: .
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      - SECRET_KEY=calendate-secret-prod-2026
      - BASE_URL=https://calendate.link
      - DATABASE_PATH=/data/calendate.db
    volumes:
      - calendate_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  calendate_data:
