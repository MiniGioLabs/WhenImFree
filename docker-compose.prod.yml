services:
  calendate:
    image: ghcr.io/minigiolabs/calendate:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - BASE_URL=https://calendate.link
      - DATABASE_PATH=/data/calendate.db
      - HTTPS_ONLY=true
    volumes:
      - calendate_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  calendate_data:
